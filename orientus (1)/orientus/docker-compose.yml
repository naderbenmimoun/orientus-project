version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: orientus-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: orientus_db
      POSTGRES_USER: orientus_user
      POSTGRES_PASSWORD: orientus_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orientus_user -d orientus_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local