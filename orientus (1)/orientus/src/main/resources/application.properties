# Application
spring.application.name=orientus

# Database PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/orientus_db
spring.datasource.username=orientus_user
spring.datasource.password=orientus_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway - DèSACTIVè
spring.flyway.enabled=false

# Server
server.port=8084

# JWT
jwt.secret=OrientusSecretKeyForJWTMustBeLongEnoughForHS512Algorithm2024SecureKey!
jwt.expiration=86400000

# Upload fichiers
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logs
logging.level.root=INFO
logging.level.com.example.orientus=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG